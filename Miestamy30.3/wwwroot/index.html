<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>miestamy</title>
  <style>
    @font-face {
      font-family: 'MMFont';
      src: url('/fonts/MMFont.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #202978;
      --orange: #FF4B00;
      --salmon: #f58765;
      --periwinkle: #C1CAED;
      --white:  #ffffff;
    }

    html, body { height: 100%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--navy); color: var(--white); overflow: hidden; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      height: 60px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 26px;
      position: relative;
      z-index: 1000;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-dots { display: flex; align-items: center; gap: 5px; }
    .logo-dot-lg { width: 18px; height: 18px; background: var(--orange); border-radius: 50%; }
    .logo-dot-sm { width: 11px; height: 11px; background: var(--orange); border-radius: 50%; }
    .logo-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 26px; color: var(--white); letter-spacing: -0.5px; line-height: 1; }

    nav { display: flex; align-items: center; gap: 10px; }
    nav a {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 17px;
      color: var(--white);
      text-decoration: none;
      cursor: pointer;
      padding-bottom: 3px;
      border-bottom: 2.5px solid transparent;
      transition: opacity 0.15s, border-color 0.15s;
    }
    nav a.active { border-bottom-color: var(--white); }
    nav a:not(.active) { opacity: 0.45; }
    nav .sep { color: var(--white); opacity: 0.4; font-size: 17px; }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    main { display: flex; height: calc(100vh - 60px); }

    /* ── Map ─────────────────────────────────────────────────────────────── */
    #map { flex: 1; min-width: 0; background: var(--periwinkle); }
    .leaflet-tile-pane { filter: hue-rotate(205deg) saturate(0.6) brightness(0.97); }
    .leaflet-control-attribution { font-size: 9px; opacity: 0.35; }
    .leaflet-control-zoom a { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif !important; }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    #sidebar {
      width: 340px;
      flex-shrink: 0;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Panels ──────────────────────────────────────────────────────────── */
    .panel { display: none; flex-direction: column; height: 100%; overflow: hidden; }
    .panel.visible { display: flex; }

    /* ── Cat header ──────────────────────────────────────────────────────── */
    #cat-header {
      padding: 16px 22px 12px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.5;
      border-bottom: 1.5px solid rgba(255,255,255,0.1);
    }
    #cat-list { flex: 1; overflow-y: auto; }
    #cat-list::-webkit-scrollbar { width: 4px; }
    #cat-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .cat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 22px;
      cursor: pointer;
      border-bottom: 1.5px solid rgba(255,255,255,0.07);
      transition: background 0.15s;
    }
    .cat-item:hover  { background: rgba(255,255,255,0.07); }
    .cat-item.active { background: rgba(255,255,255,0.12); }
    .cat-item.cat-empty { opacity: 0.35; }
    .cat-item.cat-empty:hover { background: rgba(255,255,255,0.04); }
    .empty-badge {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      font-weight: 400;
    }
    .empty-divider {
      padding: 10px 22px 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-top: 1.5px solid rgba(255,255,255,0.07);
      margin-top: 6px;
    }
    .cat-name {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 21px;
      color: var(--white);
    }
    .cat-icon-wrap {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      color: var(--white);
      flex-shrink: 0;
    }
    .cat-icon-wrap svg { width: 30px; height: 30px; }

    /* ── Filter / list panel ─────────────────────────────────────────────── */
    .panel-back {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 22px;
      cursor: pointer;
      border-bottom: 1.5px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      font-weight: 500;
      transition: color 0.15s;
    }
    .panel-back:hover { color: var(--white); }
    .panel-back-arrow { font-size: 16px; }

    .panel-title {
      padding: 16px 22px 8px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 28px;
      color: var(--white);
      line-height: 1.1;
    }
    .filter-count { padding: 0 22px 10px; font-size: 12px; color: rgba(255,255,255,0.45); font-weight: 500; }

    #filter-chips { padding: 0 18px 12px; display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      padding: 5px 13px;
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.65);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .chip:hover  { border-color: var(--white); color: var(--white); }
    .chip.active { background: var(--orange); border-color: var(--orange); color: var(--white); }

    #place-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    #place-list::-webkit-scrollbar { width: 4px; }
    #place-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .place-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 22px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.12s;
    }
    .place-row:hover  { background: rgba(255,255,255,0.06); }
    .place-row.active { background: rgba(255,255,255,0.1); }
    .place-num {
      width: 28px; height: 28px;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      flex-shrink: 0;
    }
    .place-row-name { font-size: 14px; font-weight: 700; color: var(--white); }
    .place-row-sub  { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }

    /* ── Detail side panel ───────────────────────────────────────────────── */
    #detail-panel {
      width: 0;
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.32s cubic-bezier(0.4,0,0.2,1);
      background: rgba(255,75,0,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      border-left: 1.5px solid rgba(255,255,255,0.15);
    }
    #detail-panel.open { width: 320px; }

    .detail-inner {
      width: 320px;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .detail-close {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      cursor: pointer;
      border-bottom: 1.5px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.65);
      font-size: 16px;
      font-weight: 500;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .detail-close:hover { color: var(--white); }

    .detail-img {
      height: 160px;
      background: var(--navy);
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      padding: 14px 18px;
      position: relative;
      overflow: hidden;
    }
    .detail-img::before {
      content: '';
      position: absolute;
      inset: 14px;
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 6px;
    }
    .detail-img.has-image::before {
      inset: 0;
      border: none;
      border-radius: 0;
      background: linear-gradient(transparent 35%, rgba(0,0,0,0.55));
    }
    .detail-img-label {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.3);
      padding: 3px 9px;
      border-radius: 4px;
      position: relative;
      z-index: 1;
    }

    .detail-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
    .detail-body::-webkit-scrollbar { width: 4px; }
    .detail-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    .detail-name { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 26px; color: var(--white); line-height: 1.15; margin-bottom: 6px; }
    .detail-addr { font-size: 13px; color: rgba(255,255,255,0.65); margin-bottom: 14px; font-weight: 500; }
    .detail-dates { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--white); margin-bottom: 14px; }
    .detail-cats  { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }

    .cat-badge {
      padding: 4px 11px;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      font-size: 11px; font-weight: 700; color: var(--white);
    }
    .event-badge {
      padding: 4px 11px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      font-size: 11px; font-weight: 700; color: var(--white);
    }

    .detail-section-title {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 10px; letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px; margin-top: 16px;
    }
    .detail-filter-group  { margin-bottom: 10px; }
    .detail-filter-kat    { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .detail-filter-chips  { display: flex; flex-wrap: wrap; gap: 5px; }
    .detail-chip {
      padding: 3px 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.85);
    }

    /* ── Map markers ─────────────────────────────────────────────────────── */
    .map-pin {
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .map-pin svg { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .map-pin.selected svg { filter: drop-shadow(0 0 0 3px #FF4B00) drop-shadow(0 2px 6px rgba(0,0,0,0.35)); }

    /* ── Loading ─────────────────────────────────────────────────────────── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      padding: 32px 20px; color: rgba(255,255,255,0.35); font-size: 13px;
    }

    /* ── Mobile ──────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      main { flex-direction: column; }
      #map { height: 55vh; }
      #sidebar { width: 100%; height: 45vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dots">
      <div class="logo-dot-lg"></div>
      <div class="logo-dot-sm"></div>
    </div>
    <span class="logo-text">miestamy</span>
  </div>
  <nav>
    <a id="nav-miesta" class="active">Miesta</a>
    <span class="sep">/</span>
    <a id="nav-podujatia">Podujatia</a>
  </nav>
</header>

<main>
  <div id="map"></div>

  <!-- DETAIL SIDE PANEL — slides in between map and sidebar -->
  <div id="detail-panel">
    <div class="detail-inner">
      <div class="detail-close" id="detail-close-btn">
        <span>←</span>
        <span id="detail-back-label">Späť</span>
      </div>
      <div class="detail-img">
        <span class="detail-img-label" id="detail-label">miestamy</span>
      </div>
      <div class="detail-body" id="detail-body"></div>
    </div>
  </div>

  <aside id="sidebar">

    <!-- CAT VIEW -->
    <div id="cat-view" class="panel visible">
      <div id="cat-header">Kategórie</div>
      <div id="cat-list"><div class="loading">Načítavam…</div></div>
    </div>

    <!-- FILTER + LIST VIEW -->
    <div id="filter-panel" class="panel">
      <div class="panel-back" onclick="goBack()">
        <span class="panel-back-arrow">←</span>
        <span id="back-label">Všetky kategórie</span>
      </div>
      <div class="panel-title" id="panel-title"></div>
      <div id="filter-chips"></div>
      <div class="filter-count" id="filter-count"></div>
      <div id="place-list"></div>
    </div>

  </aside>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.min.js"></script>

function getIcon(name, mode) {
  if (ICONS[name]) return ICONS[name];
  return mode === 'event' ? ICONS['_event'] : ICONS['_place'];
}

// ── State ───────────────────────────────────────────────────────────────────
let map;
let clusterGroup = null;
let focusedMarker = null;
let activeMarkerId = null;  // id of currently highlighted marker
let mode = 'miesta';
let currentMarkers = {};    // id → L.marker (kept off-map while in cluster group)
let currentKat = null;
let activeFiltre = new Set();
let currentMiesta = [];
let currentTyp = null;
let activeEventFiltre = new Set();
let currentPodujatia = [];

// ── Map init ─────────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([48.1486, 17.1077], 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://carto.com/">CARTO</a> © <a href="https://www.openstreetmap.org/">OSM</a>',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);
}

// ── Map marker factory ───────────────────────────────────────────────────────
function makeMarkerIcon(iconName, type, selected = false) {
  const iconFn = getIcon(iconName, type);
  const color  = selected ? '#FF4B00' : '#202978';
  const bg     = selected ? 'rgba(255,255,255,0.92)' : 'rgba(199,209,245,0.82)';
  const border = selected ? '3px solid #FF4B00' : '2px solid rgba(32,41,120,0.18)';
  const sz = selected ? 48 : 38;
  const innerSz = selected ? 32 : 26;
  const html = `
    <div style="
      width:${sz}px;height:${sz}px;
      background:${bg};
      border:${border};
      border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 3px 8px rgba(0,0,0,0.22);
      cursor:pointer;
    ">
      <div style="width:${innerSz}px;height:${innerSz}px;color:${color}">
        ${iconFn(color)}
      </div>
    </div>`;
  return L.divIcon({
    className: '',
    html,
    iconSize: [sz, sz],
    iconAnchor: [sz / 2, sz / 2]
  });
}

// ── API ──────────────────────────────────────────────────────────────────────
async function get(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

// ── Marker helpers ───────────────────────────────────────────────────────────
function makeClusterGroup() {
  return L.markerClusterGroup({
    maxClusterRadius: 60,
    disableClusteringAtZoom: 17,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction(cluster) {
      const count = cluster.getChildCount();
      return L.divIcon({
        className: '',
        html: `<div style="
          width:46px;height:46px;
          background:#F57E65;
          border:3px solid #202978;
          border-radius:10px;
          display:flex;align-items:center;justify-content:center;
          box-shadow:0 3px 10px rgba(0,0,0,0.25);
          font-family:'MMFont',sans-serif;
          font-size:18px;
          color:#202978;
          line-height:1;
        ">${count}</div>`,
        iconSize: [46, 46],
        iconAnchor: [23, 23]
      });
    }
  });
}

function clearMarkers() {
  activeMarkerId = null;
  if (focusedMarker) { map.removeLayer(focusedMarker); focusedMarker = null; }
  if (clusterGroup)  { map.removeLayer(clusterGroup); clusterGroup = null; }
  Object.values(currentMarkers).forEach(m => { try { map.removeLayer(m); } catch(_){} });
  currentMarkers = {};
}

function buildMarkers(items, type, iconKeyFn, onClickFn) {
  clearMarkers();

  const useClusters = typeof L.markerClusterGroup === 'function';
  if (useClusters) clusterGroup = makeClusterGroup();

  items.filter(x => x.lat && x.lng).forEach(x => {
    const iconName = iconKeyFn(x);
    const marker = L.marker([x.lat, x.lng], { icon: makeMarkerIcon(iconName, type, false) })
      .on('click', () => onClickFn(x.id));
    marker._iconName = iconName;
    marker._type = type;
    currentMarkers[x.id] = marker;
    if (useClusters) clusterGroup.addLayer(marker);
    else             marker.addTo(map);
  });

  if (useClusters) map.addLayer(clusterGroup);
}

function fitMarkers() {
  if (clusterGroup && Object.keys(currentMarkers).length) {
    const pts = Object.values(currentMarkers).map(m => m.getLatLng());
    map.fitBounds(L.latLngBounds(pts), { padding: [50, 50], maxZoom: 16 });
  }
}

function focusMarker(id) {
  // Remove previous highlight
  if (focusedMarker) { map.removeLayer(focusedMarker); focusedMarker = null; }
  activeMarkerId = id;
  const m = currentMarkers[id];
  if (!m) return;
  // Add highlighted marker directly on map — cluster group is NEVER touched,
  // so the spiral stays fully visible and clickable
  focusedMarker = L.marker(m.getLatLng(), {
    icon: makeMarkerIcon(m._iconName, m._type, true),
    zIndexOffset: 1000,
    interactive: false
  }).addTo(map);
}

function restoreMarkers() {
  if (focusedMarker) { map.removeLayer(focusedMarker); focusedMarker = null; }
  activeMarkerId = null;
  // Cluster group untouched — spiral stays as is, no zoom change
}

// ── Detail panel open/close ──────────────────────────────────────────────────
function openDetailPanel() {
  document.getElementById('detail-panel').classList.add('open');
}
function closeDetailPanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.place-row').forEach(el => el.classList.remove('active'));
  restoreMarkers();
}

// ── Mode switch ──────────────────────────────────────────────────────────────
function setMode(newMode) {
  if (mode === newMode) return;
  mode = newMode;
  document.getElementById('nav-miesta').classList.toggle('active', mode === 'miesta');
  document.getElementById('nav-podujatia').classList.toggle('active', mode === 'podujatia');

  currentKat = null; activeFiltre.clear(); currentMiesta = [];
  currentTyp = null; activeEventFiltre.clear(); currentPodujatia = [];
  clearMarkers();
  closeDetailPanel();

  document.getElementById('cat-header').textContent =
    mode === 'miesta' ? 'Kategórie' : 'Typy podujatí';
  document.getElementById('back-label').textContent =
    mode === 'miesta' ? 'Všetky kategórie' : 'Všetky typy';
  document.getElementById('cat-list').innerHTML = '<div class="loading">Načítavam…</div>';

  showView('cat');
  if (mode === 'miesta') { loadKategorie(); loadAllMiesta(); }
  else                    { loadTypy();      loadAllPodujatia(); }
}

// ── View switching (sidebar only) ────────────────────────────────────────────
function showView(view) {
  document.getElementById('cat-view').classList.toggle('visible', view === 'cat');
  document.getElementById('filter-panel').classList.toggle('visible', view === 'filter');
}

// ── MIESTA mode ──────────────────────────────────────────────────────────────
async function loadKategorie() {
  const list = await get('/kategorie');
  document.getElementById('cat-list').innerHTML = list.map(k => `
    <div class="cat-item" data-id="${k.id}" data-nazov="${k.nazov}"
         onclick="selectKategoria(${k.id},'${k.nazov}')">
      <span class="cat-name">${k.nazov}</span>
      <span class="cat-icon-wrap">${(ICONS[k.nazov] || ICONS['_place'])('#202978')}</span>
    </div>`).join('');
}

async function loadAllMiesta() {
  const miesta = await get('/miesta');
  buildMarkers(miesta, 'place', x => x.nazov, showDetail);
}

async function selectKategoria(id, nazov) {
  currentKat = { id, nazov };
  activeFiltre.clear();
  document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.cat-item[data-id="${id}"]`)?.classList.add('active');
  document.getElementById('panel-title').textContent = nazov;
  showView('filter');

  const [miesta, filtre] = await Promise.all([
    get(`/miesta/by-kategoria/${encodeURIComponent(nazov)}`),
    get(`/filters/by-kategoria/${id}`)
  ]);
  currentMiesta = miesta;
  renderChips(filtre, toggleFilter);
  renderPlaceList(miesta);
  buildMarkers(miesta, 'place', () => nazov, showDetail);
  fitMarkers();
}

function renderChips(items, toggleFn) {
  document.getElementById('filter-chips').innerHTML = items.map(f => `
    <div class="chip" data-nazov="${f.nazov}" onclick="${toggleFn.name}('${esc(f.nazov)}')">${f.nazov}</div>`).join('');
}

function esc(s) { return s.replace(/'/g, "\\'"); }

async function toggleFilter(nazov) {
  activeFiltre.has(nazov) ? activeFiltre.delete(nazov) : activeFiltre.add(nazov);
  document.querySelectorAll('.chip').forEach(c =>
    c.classList.toggle('active', activeFiltre.has(c.dataset.nazov)));

  if (!activeFiltre.size) {
    renderPlaceList(currentMiesta);
    buildMarkers(currentMiesta, 'place', () => currentKat.nazov, showDetail);
    fitMarkers(); return;
  }
  const results = await Promise.all([...activeFiltre].map(f =>
    get(`/miesta/by-filter/${encodeURIComponent(f)}`)));
  const ids = results.map(arr => new Set(arr.map(m => m.id)));
  const filtered = currentMiesta.filter(m => ids.every(s => s.has(m.id)));
  renderPlaceList(filtered);
  buildMarkers(filtered, 'place', () => currentKat.nazov, showDetail);
  fitMarkers();
}

function renderPlaceList(items) {
  document.getElementById('filter-count').textContent = `${items.length} miest`;
  const el = document.getElementById('place-list');
  if (!items.length) { el.innerHTML = '<div class="loading">Žiadne miesta</div>'; return; }
  el.innerHTML = items.map((m, i) => `
    <div class="place-row" data-id="${m.id}" onclick="showDetail(${m.id})">
      <div class="place-num">${i + 1}</div>
      <div>
        <div class="place-row-name">${m.nazov}</div>
        ${m.adresa ? `<div class="place-row-sub">${m.adresa}</div>` : ''}
      </div>
    </div>`).join('');
}

function setDetailImage(imageUrl) {
  const img = document.querySelector('.detail-img');
  if (imageUrl) {
    img.style.backgroundImage = `url(${imageUrl})`;
    img.classList.add('has-image');
  } else {
    img.style.backgroundImage = '';
    img.classList.remove('has-image');
  }
}

async function showDetail(id) {
  document.querySelectorAll('.place-row').forEach(el =>
    el.classList.toggle('active', parseInt(el.dataset.id) === id));
  focusMarker(id);
  const detail = await get(`/miesta/${id}/detail`);
  document.getElementById('detail-label').textContent = detail.nazov;
  document.getElementById('detail-back-label').textContent = currentKat ? currentKat.nazov : 'Späť';
  setDetailImage(detail.imageUrl || null);
  const sections = Object.entries(detail.filtre || {}).map(([kat, filtre]) => `
    <div class="detail-filter-group">
      <div class="detail-filter-kat">${kat}</div>
      <div class="detail-filter-chips">${filtre.map(f => `<span class="detail-chip">${f}</span>`).join('')}</div>
    </div>`).join('');
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-name">${detail.nazov}</div>
    ${detail.adresa ? `<div class="detail-addr">📍 ${detail.adresa}</div>` : ''}
    <div class="detail-cats">${(detail.kategorie || []).map(k => `<span class="cat-badge">${k}</span>`).join('')}</div>
    ${sections ? `<div class="detail-section-title">Filtre</div>${sections}` : ''}`;
  openDetailPanel();
}

function goBack() {
  closeDetailPanel();
  if (mode === 'miesta') {
    currentKat = null; activeFiltre.clear();
    document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
    showView('cat'); loadAllMiesta();
  } else {
    currentTyp = null; activeEventFiltre.clear();
    document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
    showView('cat'); loadAllPodujatia();
  }
}

// ── PODUJATIA mode ───────────────────────────────────────────────────────────
async function loadTypy() {
  const [list, activeNames] = await Promise.all([
    get('/typypodujatia'),
    get('/typypodujatia/active')
  ]);
  const activeTypy = new Set(activeNames);
  const withEvents = list.filter(t => activeTypy.has(t.nazov));
  const empty     = list.filter(t => !activeTypy.has(t.nazov));

  const renderTyp = (t, isEmpty) => `
    <div class="cat-item${isEmpty ? ' cat-empty' : ''}" data-id="${t.id}" data-nazov="${t.nazov}"
         onclick="selectTyp(${t.id},'${esc(t.nazov)}')">
      <span class="cat-name">${t.nazov}${isEmpty ? ' <span class="empty-badge">0</span>' : ''}</span>
      <span class="cat-icon-wrap">${(ICONS[t.nazov] || ICONS['_event'])(isEmpty ? '#aaa' : '#202978')}</span>
    </div>`;

  document.getElementById('cat-list').innerHTML =
    withEvents.map(t => renderTyp(t, false)).join('') +
    (empty.length ? `<div class="empty-divider">Momentálne bez eventov</div>` + empty.map(t => renderTyp(t, true)).join('') : '');
}

async function loadAllPodujatia() {
  const podujatia = await get('/podujatia');
  buildMarkers(podujatia, 'event', x => x.typNazov || '_event', showEventDetail);
}

async function selectTyp(id, nazov) {
  currentTyp = { id, nazov };
  activeEventFiltre.clear();
  document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.cat-item[data-id="${id}"]`)?.classList.add('active');
  document.getElementById('panel-title').textContent = nazov;
  showView('filter');

  const [podujatia, filtre] = await Promise.all([
    get(`/podujatia/by-typ/${encodeURIComponent(nazov)}`),
    get('/eventfilters')
  ]);
  currentPodujatia = podujatia;
  renderEventChips(filtre);
  renderEventList(podujatia);
  buildMarkers(podujatia, 'event', () => nazov, showEventDetail);
  fitMarkers();
}

function renderEventChips(filtre) {
  document.getElementById('filter-chips').innerHTML = filtre.map(f => `
    <div class="chip" data-nazov="${f.nazov}" onclick="toggleEventFilter('${esc(f.nazov)}')">${f.nazov}</div>`).join('');
}

async function toggleEventFilter(nazov) {
  activeEventFiltre.has(nazov) ? activeEventFiltre.delete(nazov) : activeEventFiltre.add(nazov);
  document.querySelectorAll('.chip').forEach(c =>
    c.classList.toggle('active', activeEventFiltre.has(c.dataset.nazov)));

  if (!activeEventFiltre.size) {
    renderEventList(currentPodujatia);
    buildMarkers(currentPodujatia, 'event', () => currentTyp.nazov, showEventDetail);
    fitMarkers(); return;
  }
  const results = await Promise.all([...activeEventFiltre].map(f =>
    get(`/podujatia/by-filter/${encodeURIComponent(f)}`)));
  const ids = results.map(arr => new Set(arr.map(p => p.id)));
  const filtered = currentPodujatia.filter(p => ids.every(s => s.has(p.id)));
  renderEventList(filtered);
  buildMarkers(filtered, 'event', () => currentTyp.nazov, showEventDetail);
  fitMarkers();
}

function fmtDate(s) {
  if (!s) return '';
  return new Date(s).toLocaleDateString('sk-SK', { day: 'numeric', month: 'short' });
}

function renderEventList(items) {
  document.getElementById('filter-count').textContent = `${items.length} podujatí`;
  const el = document.getElementById('place-list');
  if (!items.length) { el.innerHTML = '<div class="loading">Žiadne podujatia</div>'; return; }
  el.innerHTML = items.map((p, i) => `
    <div class="place-row" data-id="${p.id}" onclick="showEventDetail(${p.id})">
      <div class="place-num">${i + 1}</div>
      <div>
        <div class="place-row-name">${p.nazov}</div>
        <div class="place-row-sub">${fmtDate(p.datumOd)}${p.datumDo ? ' – ' + fmtDate(p.datumDo) : ''}</div>
      </div>
    </div>`).join('');
}

async function showEventDetail(id) {
  document.querySelectorAll('.place-row').forEach(el =>
    el.classList.toggle('active', parseInt(el.dataset.id) === id));
  focusMarker(id);
  const detail = await get(`/podujatia/${id}/detail`);
  document.getElementById('detail-label').textContent = detail.nazov;
  document.getElementById('detail-back-label').textContent = currentTyp ? currentTyp.nazov : 'Späť';
  setDetailImage(detail.imageUrl || null);
  const typy       = (detail.typy   || []).map(t => `<span class="event-badge">${t}</span>`).join('');
  const filtrChips = (detail.filtre || []).map(f => `<span class="detail-chip">${f}</span>`).join('');
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-name">${detail.nazov}</div>
    <div class="detail-dates">📅 <span>${fmtDate(detail.datumOd)}</span>${detail.datumDo ? ` – <span>${fmtDate(detail.datumDo)}</span>` : ''}</div>
    ${detail.adresa      ? `<div class="detail-addr">📍 ${detail.adresa}</div>` : ''}
    ${detail.miestoNazov ? `<div class="detail-addr" style="margin-top:-10px">🏠 ${detail.miestoNazov}</div>` : ''}
    ${typy       ? `<div class="detail-cats">${typy}</div>` : ''}
    ${filtrChips ? `<div class="detail-section-title">Filtre</div><div class="detail-filter-chips" style="margin-bottom:8px">${filtrChips}</div>` : ''}
    ${detail.popis ? `<div class="detail-section-title">O podujatí</div><p style="font-size:13px;color:rgba(255,255,255,0.8);line-height:1.6">${detail.popis}</p>` : ''}
    ${detail.sourceUrl ? `<div style="margin-top:14px"><a href="${detail.sourceUrl}" target="_blank" style="font-size:12px;color:var(--orange);text-decoration:none;font-weight:600">→ Viac info</a></div>` : ''}`;
  openDetailPanel();
}

// ── Boot ─────────────────────────────────────────────────────────────────────
(async () => {
  initMap();
  document.getElementById('nav-miesta').addEventListener('click',    () => setMode('miesta'));
  document.getElementById('nav-podujatia').addEventListener('click', () => setMode('podujatia'));
  document.getElementById('detail-close-btn').addEventListener('click', closeDetailPanel);
  showView('cat');
  await Promise.all([loadKategorie(), loadAllMiesta()]);
})();
</script>
